# terminology.yaml
# Machine-readable controlled vocabulary for architecture description (AD) documents.
# Source of truth: ISO/IEC/IEEE 42010:2022, Clause 3 (terms 3.1-3.19).
# This file MUST agree with docs/glossary.md. If they disagree, the standard governs.
#
# Consumers: a checking/authoring agent loads this to (a) recognize the defined concepts,
# (b) prefer the canonical term, (c) avoid deprecated terms, (d) keep view/viewpoint and
# other neighbouring terms distinct.
#
# Field meanings:
#   term         canonical term, as written in running text (lowercase)
#   abbrev       standard abbreviation, if any (expand on first use, then use abbrev)
#   clause       defining clause in 42010:2022
#   status       defined | concept | deprecated
#   definition   genus-differentia form; "verbatim" or "paraphrase" recorded in `source`
#   source       verbatim | paraphrase (+ provenance for borrowed definitions)
#   new_in_2022  true if newly defined or renamed in the 2022 edition
#   replaces     deprecated term(s) this term supersedes
#   do_not_confuse_with  neighbouring terms and the distinguishing test
#   usage        one-line usage rule

standard:
  id: "ISO/IEC/IEEE 42010:2022"
  title: "Software, systems and enterprise — Architecture description"
  edition: 2
  cite_as: "42010:2022"

defined_terms:
  - term: architecting
    clause: "3.1"
    status: defined
    definition: "conceiving, defining, expressing, documenting, communicating, certifying proper implementation of, maintaining and improving an architecture throughout the life cycle of an entity of interest"
    source: verbatim
    usage: "The activity, not its work product. The work product is an architecture description."
    do_not_confuse_with:
      - term: architecture description
        test: "architecting is the activity; the AD is its work product"

  - term: architecture
    clause: "3.2"
    status: defined
    definition: "fundamental concepts or properties of an entity in its environment and governing principles for the realization and evolution of this entity and its related life cycle processes"
    source: "verbatim; SOURCE: 42020:2019, 3.3, modified"
    usage: "Intangible subject; expressed by an AD, never itself a document."

  - term: architecture description
    abbrev: AD
    clause: "3.3"
    status: defined
    definition: "work product used to express an architecture"
    source: verbatim
    usage: "The tangible deliverable this guide governs. Expand '(AD)' on first use."

  - term: architecture description element
    abbrev: AD element
    clause: "3.4"
    status: defined
    new_in_2022: true
    definition: "identified or named part of an architecture description"
    source: verbatim
    usage: "Any named constituent of an AD; an AD may be an AD element in another AD."

  - term: architecture description framework
    abbrev: ADF
    clause: "3.5"
    status: defined
    new_in_2022: true
    replaces: ["architecture framework"]
    definition: "conventions, principles and practices for the description of architectures established within a specific domain of application or community of stakeholders"
    source: verbatim
    usage: "A domain framework (RM-ODP, UAF, NAF, GERAM). Never 'architecture framework'."

  - term: architecture description language
    abbrev: ADL
    clause: "3.6"
    status: defined
    definition: "means of expression, with syntax and semantics, consisting of a set of representations, conventions, and associated rules intended to be used to describe an architecture"
    source: verbatim
    usage: "A description language (AADL, ArchiMate, UML, SysML, UAF Profile)."

  - term: architecture view
    clause: "3.7"
    status: defined
    definition: "information part comprising portion of an architecture description"
    source: verbatim
    usage: "The applied result; adheres to exactly one governing viewpoint; comprises view components."
    do_not_confuse_with:
      - term: architecture viewpoint
        test: "reusable conventions => viewpoint; specific applied result in this AD => view"

  - term: architecture viewpoint
    clause: "3.8"
    status: defined
    definition: "set of conventions for the creation, interpretation and use of an architecture view to frame one or more concerns"
    source: verbatim
    usage: "Reusable conventions; frames 1..* concerns and governs 1..* views. 'frame' = shape/compose/give expression to."
    do_not_confuse_with:
      - term: architecture view
        test: "conventions/lens => viewpoint; result seen through the lens => view"
      - term: stakeholder perspective
        test: "conventions that frame concerns in a view => viewpoint; a way of thinking that groups concerns => perspective"

  - term: aspect
    clause: "3.9"
    status: defined
    new_in_2022: true
    definition: "part of an entity's character or nature"
    source: verbatim
    usage: "A facet of the entity (functional, structural, informational). Aspects<->concerns are many-to-many."
    do_not_confuse_with:
      - term: concern
        test: "part of the entity's character => aspect; a stakeholder's matter of interest => concern"

  - term: concern
    clause: "3.10"
    status: defined
    definition: "matter of relevance or importance to a stakeholder"
    source: "verbatim; SOURCE: 42020:2019, 3.8, notes modified"
    usage: "Held by 1..* stakeholders; framed by 1..* viewpoints. Every AD concern must be framed by at least one viewpoint."
    do_not_confuse_with:
      - term: requirement
        test: "a matter of interest => concern; a 'shall' the architecture must satisfy => requirement"

  - term: correspondence
    clause: "3.11"
    status: defined
    definition: "identified or named relationship between two or more architecture description elements"
    source: verbatim
    usage: "Relates 2..* AD elements (equivalence, composition, refinement, consistency, traceability, dependency, constraint, satisfaction, obligation); governed by a correspondence method."
    do_not_confuse_with:
      - term: correspondence method
        test: "the relationship => correspondence; what governs it => correspondence method"

  - term: entity of interest
    abbrev: EoI
    clause: "3.12"
    status: defined
    new_in_2022: true
    replaces: ["system of interest"]
    definition: "subject of an architecture description"
    source: verbatim
    usage: "The thing the AD describes (enterprise, system, product, service, software item, ...). Never 'system of interest'."

  - term: environment
    clause: "3.13"
    status: defined
    definition: "context of surrounding things, conditions, or influences upon an entity"
    source: verbatim
    usage: "The setting in which the EoI exists."

  - term: information part
    clause: "3.14"
    status: defined
    new_in_2022: true
    definition: "separately identifiable body of information that is produced, stored, and delivered for human and machine use"
    source: verbatim
    usage: "An identifiable unit of recorded information; an AD and each view are information parts."

  - term: model kind
    clause: "3.15"
    status: defined
    definition: "category of model distinguished by its key characteristics and modelling conventions"
    source: verbatim
    usage: "A category (functional, activity, structural, use-case, analytic, ...); governs model-based view components. Only 'model kind' is defined, not 'model'."

  - term: specification
    clause: "3.16"
    status: defined
    new_in_2022: true
    definition: "information part that identifies, in a complete, precise and verifiable manner, the requirements, design, behaviour, or other expected characteristics of an entity"
    source: "verbatim; SOURCE: 15289:2019, 3.1.26, modified"
    usage: "Reserve for this precise sense; do not use loosely for any document."

  - term: stakeholder
    clause: "3.17"
    status: defined
    definition: "role, position, individual, organization, or classes thereof, having an interest, right, share, or claim, in an entity of interest"
    source: verbatim
    usage: "Holder of a concern; identify as roles/classes, not named persons, unless an individual genuinely is the stakeholder."
    do_not_confuse_with:
      - term: user
        test: "a user is one kind of stakeholder; not every stakeholder is a user"

  - term: stakeholder perspective
    clause: "3.18"
    status: defined
    new_in_2022: true
    definition: "way of thinking about an entity of interest, especially as it relates to concerns"
    source: verbatim
    usage: "Groups concerns and organizes viewpoints. Distinct from architecture viewpoint."

  - term: view component
    abbrev: architecture view component
    clause: "3.19"
    status: defined
    new_in_2022: true
    replaces: ["architecture model"]
    definition: "separable portion of one or more architecture views that is governed by the applicable model kind or legend"
    source: verbatim
    usage: "Model-based => governed by a model kind; non-model-based => documented by a legend. Never 'architecture model'."

# Concepts that recur in ADs but are NOT Clause-3 defined terms.
# Treat as ordinary concepts / required content; do not capitalize or formalize as terms.
related_concepts:
  - term: architecture decision
    status: concept
    note: "Required content (6.10.1) and a model concept, but not a Clause-3 term. Record explicitly with an identifier."
  - term: architecture rationale
    status: concept
    note: "Required content (6.10.2); pair with every decision. Not a Clause-3 term."
  - term: correspondence method
    status: concept
    clause: "6.9.3"
    replaces: ["correspondence rule"]
    note: "Correct 2022 word for what governs a correspondence. Not a Clause-3 term."
  - term: legend
    status: concept
    note: "Informal documentation of a non-model-based view component's conventions (used in 3.19)."
  - term: system
    status: concept
    note: "An EXAMPLE of an entity of interest, not a defined term. Prefer 'entity of interest' generically."
  - term: model
    status: concept
    note: "Not defined. Only 'model kind' is defined. Prefer 'view component' governed by a 'model kind'."

# Deprecated terms. Presence of any of these in a document is an ERROR.
# The authoritative replacement map is in substitutions.yaml.
deprecated_terms:
  - term: system of interest
    replace_with: entity of interest
    severity: error
  - term: architecture framework
    replace_with: architecture description framework
    severity: error
  - term: architecture model
    replace_with: view component
    severity: error
  - term: correspondence rule
    replace_with: correspondence method
    severity: error
